name: 听写复习本
options:
  minimumXcodeGenVersion: 2.38.0
targets:
  听写复习本:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - 错字复习
    dependencies:
      - target: TypoWidget
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.xiaorsz.typo-review
        MARKETING_VERSION: 1.1.0
        CURRENT_PROJECT_VERSION: 2
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_UIBackgroundModes:
          - remote-notification
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad: UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDevelopmentRegion: zh_Hans
        INFOPLIST_KEY_CFBundleLocalizations:
          - zh_Hans
          - en

  TypoWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - TypoWidget
      - path: 错字复习/AppModel.swift
        type: file
      - path: 错字复习/TaskItem.swift
        type: file
      - path: 错字复习/ReviewItem.swift
        type: file
      - path: 错字复习/DictationSession.swift
        type: file
      - path: 错字复习/DictationEntry.swift
        type: file
      - path: 错字复习/TaskCompletion.swift
        type: file
      - path: 错字复习/ReviewRecord.swift
        type: file
      - path: 错字复习/AppSettings.swift
        type: file
    info:
      path: TypoWidget/Info.plist
      properties:
        CFBundleDisplayName: "听写复习本"
        NSExtension:
          NSExtensionPointIdentifier: "com.apple.widgetkit-extension"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cc.xiaorsz.typo-review.TypoWidget
        MARKETING_VERSION: 1.1.0
        CURRENT_PROJECT_VERSION: 2
